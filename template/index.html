<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aura AI - Voice Interaction</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main">
      <div class="ambient-glow">
        <div class="glow-circle"></div>
      </div>

      <div class="orb-container">
        <div class="ai-orb"></div>
      </div>

      <div id="question-bubble" class="bubble-question hidden">
        <span id="question-text"></span>
      </div>

      <div class="bottom-area">
        <div class="visualizer glass-panel">
          <div class="bar bar-h2 pulse-1"></div>
          <div class="bar bar-h4 pulse-2"></div>
          <div class="bar bar-h6 pulse-3"></div>
          <div class="bar bar-h3 pulse-4"></div>
          <div class="bar bar-h5 pulse-5"></div>
          <div class="bar bar-h2 pulse-6"></div>
        </div>

        <button class="action-btn" id="mic-btn">
          <span class="material-symbols-outlined icon-lg icon-mic">mic</span>
          <span class="material-symbols-outlined icon-lg icon-stop">stop</span>
        </button>

        <p class="hint-text">Tap to start speaking</p>
      </div>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
