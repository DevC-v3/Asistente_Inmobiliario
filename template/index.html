<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Depa IA - Asistente de Voz</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main">
      <button class="header-btn header-btn-left" onclick="location.href='/home'">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <button class="header-btn header-btn-right">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="ambient-glow">
        <div class="glow-circle"></div>
      </div>

      <div class="orb-container">
        <div class="ai-orb"></div>
      </div>

      <div class="bottom-area">
        <div class="visualizer glass-panel hidden" id="visualizer">
          <div class="bar bar-h2 pulse-1"></div>
          <div class="bar bar-h4 pulse-2"></div>
          <div class="bar bar-h6 pulse-3"></div>
          <div class="bar bar-h3 pulse-4"></div>
          <div class="bar bar-h5 pulse-5"></div>
          <div class="bar bar-h2 pulse-6"></div>
        </div>

        <button class="action-btn" id="mic-btn">
          <span class="material-symbols-outlined icon-lg icon-mic">mic</span>
          <span class="material-symbols-outlined icon-lg icon-stop">stop</span>
        </button>

        <p class="hint-text">Tap to start speaking</p>
      </div>
    </main>
    <div id="chat-popover" class="chat-popover glass-panel hidden">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-status-dot"></div>
          <span class="chat-title">Depa IA</span>
        </div>
        <button id="chat-close-btn" class="chat-close-btn">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
    </div>
    <button id="chat-toggle-btn" class="chat-bubble-btn glass-panel">
      <span class="material-symbols-outlined icon-chat">chat_bubble</span>
    </button>
    <script src="/assets/app.js"></script>
  </body>
</html>
